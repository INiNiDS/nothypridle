name: Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwayland-dev \
            wayland-protocols \
            pkg-config \
            rpm \
            liblzma-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Prepare binary archive
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="nothypridle-${TAG}-x86_64-unknown-linux-gnu"
          mkdir -p "$NAME"
          cp target/release/nhidle "$NAME/"
          cp README.md dist/config.example.aam dist/rules.example.aam dist/schema.aam dist/nhidle-cargo.service "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"
          echo "BIN_ARCHIVE=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Build .deb package
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - run: cargo deb -p nothypridle

      - name: Build .rpm package
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-rpm
      - run: cargo rpm build

      - name: Generate PKGBUILD
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SRC_URL="https://github.com/ininids/nothypridle/archive/refs/tags/${TAG}.tar.gz"
          curl -sLo source.tar.gz "$SRC_URL"
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          rm source.tar.gz

          cat > PKGBUILD << PKGBUILD_EOF
          # Maintainer: Nikita Goncharov <ininids@ininids.in.rs>

          pkgname=nothypridle
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="A Wayland idle management daemon written in Rust"
          arch=('x86_64')
          url="https://github.com/ininids/nothypridle"
          license=('BSD-3-Clause')
          makedepends=('cargo' 'pkg-config' 'wayland-protocols')
          depends=('wayland')
          source=("\$pkgname-\$pkgver.tar.gz::${SRC_URL}")
          sha256sums=('${SHA256}')

          build() {
            cd "\$pkgname-\$pkgver"
            cargo build --release --locked
          }

          package() {
            cd "\$pkgname-\$pkgver"
            install -Dm755 target/release/nhidle "\$pkgdir/usr/bin/nothypridle"
            install -Dm644 README.md "\$pkgdir/usr/share/doc/\$pkgname/README.md"
            install -Dm644 dist/config.example.aam "\$pkgdir/usr/share/\$pkgname/config.example.aam"
            install -Dm644 dist/rules.example.aam "\$pkgdir/usr/share/\$pkgname/rules.example.aam"
            install -Dm644 dist/nhidle-cargo.service "\$pkgdir/usr/lib/systemd/user/nothypridle.service"
          }
          PKGBUILD_EOF

          echo "PKGBUILD=${PWD}/PKGBUILD" >> "$GITHUB_ENV"

      - name: Validate Nix flake
        uses: nixbuild/nix-quick-install-action@v28
      - run: nix build --print-build-logs

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            "${{ env.BIN_ARCHIVE }}" \
            target/debian/*.deb \
            target/generate-rpm/*.rpm \
            "${{ env.PKGBUILD }}"
