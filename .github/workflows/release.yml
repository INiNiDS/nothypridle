name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-plz-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config

      - name: Check compilation
        run: cargo check --workspace

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binary
        run: cargo build --release

      - name: Package and upload
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="nothypridle") | .version')
          NAME="nothypridle-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "$NAME"
          cp target/release/nhidle "$NAME/"
          cp README.md dist/config.example.aam dist/rules.example.aam dist/schema.aam dist/nhidle-cargo.service "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"

          TAG="v${VERSION}"
          SRC_URL="https://github.com/ininids/nothypridle/archive/refs/tags/${TAG}.tar.gz"
          curl -sLo source.tar.gz "$SRC_URL"
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          rm source.tar.gz

          cat > PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          pkgname=nothypridle
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="A Wayland idle management daemon written in Rust"
          arch=('x86_64')
          url="https://github.com/ininids/nothypridle"
          license=('BSD-3-Clause')
          makedepends=('cargo' 'pkg-config' 'wayland-protocols')
          depends=('wayland')
          source=("$pkgname-$pkgver.tar.gz::${SRC_URL}")
          sha256sums=('__SHA256__')

          build() {
            cd "$pkgname-$pkgver"
            cargo build --release --locked
          }

          package() {
            cd "$pkgname-$pkgver"
            install -Dm755 target/release/nhidle "$pkgdir/usr/bin/nothypridle"
            install -Dm644 README.md "$pkgdir/usr/share/doc/$pkgname/README.md"
            install -Dm644 dist/config.example.aam "$pkgdir/usr/share/$pkgname/config.example.aam"
            install -Dm644 dist/rules.example.aam "$pkgdir/usr/share/$pkgname/rules.example.aam"
            install -Dm644 dist/nhidle-cargo.service "$pkgdir/usr/lib/systemd/user/nothypridle.service"
          }
          PKGBUILD_EOF

          sed -i "s/__VERSION__/${VERSION}/g" PKGBUILD
          sed -i "s/__SHA256__/${SHA256}/g" PKGBUILD

          gh release upload "v${VERSION}" "${NAME}.tar.gz" PKGBUILD
        env:
          GH_TOKEN: ${{ github.token }}

  build-assets:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config

      - name: Check compilation
        run: cargo check --workspace

      - name: Build release binary
        run: cargo build --release

      - name: Package and upload
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="nothypridle") | .version')
          NAME="nothypridle-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "$NAME"
          cp target/release/nhidle "$NAME/"
          cp README.md dist/config.example.aam dist/rules.example.aam dist/schema.aam dist/nhidle-cargo.service "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"

          TAG="v${VERSION}"
          SRC_URL="https://github.com/ininids/nothypridle/archive/refs/tags/${TAG}.tar.gz"
          curl -sLo source.tar.gz "$SRC_URL"
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          rm source.tar.gz

          cat > PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          pkgname=nothypridle
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="A Wayland idle management daemon written in Rust"
          arch=('x86_64')
          url="https://github.com/ininids/nothypridle"
          license=('BSD-3-Clause')
          makedepends=('cargo' 'pkg-config' 'wayland-protocols')
          depends=('wayland')
          source=("$pkgname-$pkgver.tar.gz::__SRC_URL__")
          sha256sums=('__SHA256__')

          build() {
            cd "$pkgname-$pkgver"
            cargo build --release --locked
          }

          package() {
            cd "$pkgname-$pkgver"
            install -Dm755 target/release/nhidle "$pkgdir/usr/bin/nothypridle"
            install -Dm644 README.md "$pkgdir/usr/share/doc/$pkgname/README.md"
            install -Dm644 dist/config.example.aam "$pkgdir/usr/share/$pkgname/config.example.aam"
            install -Dm644 dist/rules.example.aam "$pkgdir/usr/share/$pkgname/rules.example.aam"
            install -Dm644 dist/nhidle-cargo.service "$pkgdir/usr/lib/systemd/user/nothypridle.service"
          }
          PKGBUILD_EOF

          sed -i "s/__VERSION__/${VERSION}/g" PKGBUILD
          sed -i "s/__SHA256__/${SHA256}/g" PKGBUILD
          sed -i "s|__SRC_URL__|${SRC_URL}|g" PKGBUILD

          gh release upload "v${VERSION}" "${NAME}.tar.gz" PKGBUILD
        env:
          GH_TOKEN: ${{ github.token }}
