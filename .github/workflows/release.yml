name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-plz-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config rpm alien

      - name: Check compilation
        run: cargo check --workspace

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

      - name: Build release binary
        run: cargo build --release

      - name: Package and upload
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="nothypridle") | .version')
          TAG="v${VERSION}"
          BIN_NAME="nothypridle-${VERSION}-x86_64-unknown-linux-gnu"
          BIN_URL="https://github.com/ininids/nothypridle/releases/download/${TAG}/${BIN_NAME}.tar.gz"

          # Binary archive: binary + service file, flat
          mkdir -p "${BIN_NAME}"
          cp target/release/nothypridle "${BIN_NAME}/"
          cat > "${BIN_NAME}/nothypridle.service" << 'SVC'
          [Unit]
          Description=nothypridle Wayland idle daemon
          After=graphical-session.target
          PartOf=graphical-session.target
          [Service]
          Type=simple
          ExecStart=nothypridle
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=graphical-session.target
          SVC
          tar czf "${BIN_NAME}.tar.gz" -C "${BIN_NAME}" .

          # .deb package
          DEB_ROOT="deb-pkg"
          mkdir -p "${DEB_ROOT}/DEBIAN" "${DEB_ROOT}/usr/bin" "${DEB_ROOT}/usr/lib/systemd/user"
          cp target/release/nothypridle "${DEB_ROOT}/usr/bin/"
          cat > "${DEB_ROOT}/usr/lib/systemd/user/nothypridle.service" << 'SVC'
          [Unit]
          Description=nothypridle Wayland idle daemon
          After=graphical-session.target
          PartOf=graphical-session.target
          [Service]
          Type=simple
          ExecStart=/usr/bin/nothypridle
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=graphical-session.target
          SVC
          cat > "${DEB_ROOT}/DEBIAN/control" << 'CTRL'
          Package: nothypridle
          Version: __VERSION__
          Architecture: amd64
          Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          Section: utils
          Priority: optional
          Depends: libwayland-client0
          Description: Wayland idle management daemon with smart inhibitors
           nothypridle watches per-rule idle timers through the Wayland
           ext-idle-notification-v1 protocol with configurable inhibitors
           (CPU/GPU/RAM/VRAM, processes, audio, fullscreen).
          CTRL
          sed -i "s/__VERSION__/${VERSION}/g" "${DEB_ROOT}/DEBIAN/control"
          dpkg-deb --build "${DEB_ROOT}" "nothypridle_${VERSION}_amd64.deb"

          # .rpm via alien
          sudo alien -r --scripts "nothypridle_${VERSION}_amd64.deb"
          RPM_FILE=$(ls nothypridle-${VERSION}*.rpm | head -1)

          # PKGBUILD (binary, no cargo)
          SHA256=$(sha256sum "${BIN_NAME}.tar.gz" | cut -d' ' -f1)
          cat > PKGBUILD << 'EOPKG'
          # Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          pkgname=nothypridle-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="A Wayland idle management daemon written in Rust"
          arch=('x86_64')
          url="https://github.com/ininids/nothypridle"
          license=('BSD-3-Clause')
          depends=('wayland')
          source=("${pkgname}-${pkgver}.tar.gz::__BIN_URL__")
          sha256sums=('__SHA256__')
          package() {
            cd "${srcdir}"
            tar xzf "${pkgname}-${pkgver}.tar.gz"
            find . -name nothypridle -type f -exec install -Dm755 {} "${pkgdir}/usr/bin/nothypridle" \;
          }
          EOPKG
          sed -i "s/__VERSION__/${VERSION}/g" PKGBUILD
          sed -i "s/__SHA256__/${SHA256}/g" PKGBUILD
          sed -i "s|__BIN_URL__|${BIN_URL}|g" PKGBUILD

          gh release upload "${TAG}" --clobber \
            "${BIN_NAME}.tar.gz" \
            "nothypridle_${VERSION}_amd64.deb" \
            "${RPM_FILE}" \
            PKGBUILD
        env:
          GH_TOKEN: ${{ github.token }}

  build-assets:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libdbus-1-dev libwayland-dev wayland-protocols pkg-config rpm alien

      - name: Check compilation
        run: cargo check --workspace

      - name: Publish to crates.io
        run: cargo publish -p nothypridle
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

      - name: Build release binary
        run: cargo build --release

      - name: Package and upload
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="nothypridle") | .version')
          TAG="v${VERSION}"
          BIN_NAME="nothypridle-${VERSION}-x86_64-unknown-linux-gnu"
          BIN_URL="https://github.com/ininids/nothypridle/releases/download/${TAG}/${BIN_NAME}.tar.gz"

          mkdir -p "${BIN_NAME}"
          cp target/release/nothypridle "${BIN_NAME}/"
          cat > "${BIN_NAME}/nothypridle.service" << 'SVC'
          [Unit]
          Description=nothypridle Wayland idle daemon
          After=graphical-session.target
          PartOf=graphical-session.target
          [Service]
          Type=simple
          ExecStart=nothypridle
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=graphical-session.target
          SVC
          tar czf "${BIN_NAME}.tar.gz" -C "${BIN_NAME}" .

          DEB_ROOT="deb-pkg"
          mkdir -p "${DEB_ROOT}/DEBIAN" "${DEB_ROOT}/usr/bin" "${DEB_ROOT}/usr/lib/systemd/user"
          cp target/release/nothypridle "${DEB_ROOT}/usr/bin/"
          cat > "${DEB_ROOT}/usr/lib/systemd/user/nothypridle.service" << 'SVC'
          [Unit]
          Description=nothypridle Wayland idle daemon
          After=graphical-session.target
          PartOf=graphical-session.target
          [Service]
          Type=simple
          ExecStart=/usr/bin/nothypridle
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=graphical-session.target
          SVC
          cat > "${DEB_ROOT}/DEBIAN/control" << 'CTRL'
          Package: nothypridle
          Version: __VERSION__
          Architecture: amd64
          Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          Section: utils
          Priority: optional
          Depends: libwayland-client0
          Description: Wayland idle management daemon with smart inhibitors
           nothypridle watches per-rule idle timers through the Wayland
           ext-idle-notification-v1 protocol with configurable inhibitors
           (CPU/GPU/RAM/VRAM, processes, audio, fullscreen).
          CTRL
          sed -i "s/__VERSION__/${VERSION}/g" "${DEB_ROOT}/DEBIAN/control"
          dpkg-deb --build "${DEB_ROOT}" "nothypridle_${VERSION}_amd64.deb"

          sudo alien -r --scripts "nothypridle_${VERSION}_amd64.deb"
          RPM_FILE=$(ls nothypridle-${VERSION}*.rpm | head -1)

          curl -sLo source.tar.gz "${BIN_URL}"
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          rm source.tar.gz
          cat > PKGBUILD << 'EOPKG'
          # Maintainer: Nikita Goncharov <ininids@ininids.in.rs>
          pkgname=nothypridle-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="A Wayland idle management daemon written in Rust"
          arch=('x86_64')
          url="https://github.com/ininids/nothypridle"
          license=('BSD-3-Clause')
          depends=('wayland')
          source=("${pkgname}-${pkgver}.tar.gz::__BIN_URL__")
          sha256sums=('__SHA256__')
          package() {
            cd "${srcdir}"
            tar xzf "${pkgname}-${pkgver}.tar.gz"
            find . -name nothypridle -type f -exec install -Dm755 {} "${pkgdir}/usr/bin/nothypridle" \;
          }
          EOPKG
          sed -i "s/__VERSION__/${VERSION}/g" PKGBUILD
          sed -i "s/__SHA256__/${SHA256}/g" PKGBUILD
          sed -i "s|__BIN_URL__|${BIN_URL}|g" PKGBUILD

          gh release upload "${TAG}" --clobber \
            "${BIN_NAME}.tar.gz" \
            "nothypridle_${VERSION}_amd64.deb" \
            "${RPM_FILE}" \
            PKGBUILD
        env:
          GH_TOKEN: ${{ github.token }}
